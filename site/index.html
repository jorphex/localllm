<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Local LLM research, benchmark evidence, and testing notes.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>localllm — benchmark evidence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:CRSV,SHRP,slnt,wght@0..1,0..100,-12..0,300..700&display=swap');
    :root {
      --canvas: #e9eced;
      --surface: #f7f8f7;
      --surface-2: #dde2e3;
      --ink: #172027;
      --ink-2: #46545d;
      --ink-3: #52616a;
      --rule: #b8c0c3;
      --strong-rule: #7d898f;
      --accent: #e34b24;
      --accent-soft: #f7d8d0;
      --pass: #167257;
      --pass-soft: #d5e9e2;
      --warn: #a43c24;
      --blue: #245bb8;
      --blue-soft: #dce5f5;
      --focus: #005fcc;
      --header-h: 54px;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--canvas);
      color: var(--ink);
      font-family: Geologica, "Arial Narrow", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      font-variation-settings: "SHRP" 35;
    }
    button { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }
    button:focus-visible, a:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; }
    .topbar {
      height: var(--header-h);
      border-bottom: 1px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 24px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .brand { font-size: 18px; font-weight: 650; letter-spacing: -.03em; white-space: nowrap; }
    .brand span { color: var(--accent); }
    .top-meta { display: flex; gap: 18px; color: var(--ink-3); font-size: 12px; font-variant-numeric: tabular-nums; }
    .top-meta b { color: var(--ink); font-weight: 520; }
    .shell { max-width: 1500px; margin: 0 auto; padding: 26px 28px 72px; }
    .run-head {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(330px, .65fr);
      gap: 36px;
      align-items: end;
      padding: 8px 0 26px;
      border-bottom: 1px solid var(--ink);
    }
    .run-head h1 { margin: 5px 0 8px; font-size: 36px; line-height: 1.02; letter-spacing: -.035em; text-wrap: balance; }
    .run-head p { max-width: 68ch; margin: 0; color: var(--ink-2); text-wrap: pretty; }
    .overline { color: var(--ink-3); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
    .gate-note { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start; }
    .gate-mark { width: 34px; height: 34px; display: grid; place-items: center; background: var(--accent); color: #fff; font-size: 18px; font-weight: 650; }
    .gate-note b { display: block; margin-bottom: 3px; font-size: 15px; }
    .gate-note p { font-size: 14px; color: var(--ink-2); }
    .selector-label { margin: 24px 0 8px; display: flex; justify-content: space-between; color: var(--ink-3); font-size: 12px; }
    .model-selector { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--ink); background: var(--ink); gap: 1px; }
    .model-button {
      border: 0;
      background: var(--surface);
      color: var(--ink);
      text-align: left;
      padding: 13px 14px 12px;
      cursor: pointer;
      min-width: 0;
      transition: background 180ms var(--ease), color 180ms var(--ease);
    }
    .model-button:hover { background: #fff; }
    .model-button.active { background: var(--ink); color: #fff; }
    .model-button .build { color: var(--accent); font-size: 12px; font-weight: 650; }
    .model-button .name { display: block; margin: 2px 0 7px; font-size: 16px; font-weight: 580; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .model-button .model-foot { display: flex; justify-content: space-between; gap: 6px; font-size: 12px; color: var(--ink-3); }
    .model-button.active .model-foot { color: #aeb9bf; }
    .suite-nav {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      border-bottom: 1px solid var(--ink);
      margin-top: 28px;
      scrollbar-width: none;
    }
    .suite-nav::-webkit-scrollbar { display: none; }
    .suite-tab { border: 0; background: transparent; padding: 10px 13px; color: var(--ink-3); white-space: nowrap; cursor: pointer; border-bottom: 3px solid transparent; }
    .suite-tab:hover { color: var(--ink); }
    .suite-tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 580; }
    .view { display: none; padding-top: 26px; }
    .view.active { display: block; animation: view-in 150ms var(--ease); }
    @keyframes view-in { from { opacity: .6; } }
    .section-intro { display: flex; justify-content: space-between; align-items: end; gap: 36px; margin-bottom: 18px; }
    .section-intro h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: -.025em; }
    .section-intro p { color: var(--ink-2); margin: 0; max-width: 66ch; font-size: 14px; }
    .section-intro .reading { max-width: 360px; text-align: right; color: var(--ink-3); }
    .matrix-scroll { overflow-x: auto; border-top: 1px solid var(--ink); }
    .matrix { width: 100%; border-collapse: collapse; min-width: 860px; font-variant-numeric: tabular-nums; }
    .matrix th { padding: 10px; border-bottom: 1px solid var(--strong-rule); text-align: left; font-size: 11px; color: var(--ink-3); font-weight: 580; text-transform: uppercase; letter-spacing: .045em; }
    .matrix td { padding: 11px 10px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
    .matrix tr[data-model] { cursor: pointer; }
    .matrix tr[data-model]:hover td { background: rgba(255,255,255,.44); }
    .matrix tr.selected td { background: var(--surface); }
    .matrix tr.selected td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
    .model-cell b { display: block; font-weight: 580; }
    .model-cell small { color: var(--ink-3); }
    .ratio { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
    .ratio b { font-weight: 600; }
    .mini-track { width: 54px; height: 6px; background: var(--surface-2); }
    .mini-track i { display: block; height: 100%; background: var(--pass); }
    .mini-track i.partial { background: var(--accent); }
    .status-word { color: var(--pass); font-size: 12px; font-weight: 600; }
    .status-word.fail { color: var(--warn); }
    .finding {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 155px minmax(0, 1fr);
      gap: 24px;
      border-top: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      padding: 16px 0;
    }
    .finding h3 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
    .finding p { margin: 0; font-size: 17px; line-height: 1.35; max-width: 76ch; text-wrap: pretty; }
    .chart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1px; background: var(--ink); border: 1px solid var(--ink); }
    .chart-block { background: var(--surface); padding: 17px; min-width: 0; }
    .chart-block.wide { grid-column: 1 / -1; }
    .chart-head { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
    .chart-head h3 { margin: 0; font-size: 15px; font-weight: 580; }
    .chart-head span { color: var(--ink-3); font-size: 12px; }
    .bar-list { display: grid; gap: 11px; }
    .bar-row { display: grid; grid-template-columns: 180px minmax(80px, 1fr) 72px; align-items: center; gap: 10px; font-size: 13px; }
    .bar-row.selected .bar-label { color: var(--accent); font-weight: 650; }
    .bar-track { height: 18px; background: var(--surface-2); position: relative; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--blue); transform-origin: left; transition: transform 260ms var(--ease), background 180ms; }
    .bar-row.selected .bar-fill { background: var(--accent); }
    .bar-value { text-align: right; font-variant-numeric: tabular-nums; font-weight: 580; }
    .context-chart { width: 100%; height: auto; min-height: 240px; display: block; }
    .context-chart .gridline { stroke: var(--rule); stroke-width: 1; }
    .context-chart .axis-text { fill: var(--ink-3); font: 12px Geologica, sans-serif; }
    .context-chart .line { fill: none; stroke-width: 2.5; vector-effect: non-scaling-stroke; }
    .context-chart .point { stroke: var(--surface); stroke-width: 2; vector-effect: non-scaling-stroke; }
    .legend { display: flex; flex-wrap: wrap; gap: 13px; margin-top: 10px; }
    .legend button { border: 0; background: transparent; padding: 4px 0; color: var(--ink-2); cursor: pointer; font-size: 12px; }
    .legend i { display: inline-block; width: 16px; height: 3px; margin-right: 6px; vertical-align: middle; }
    .legend i.dashed { height: 0; background: transparent !important; border-top: 3px dashed currentColor; }
    .task-scroll { overflow-x: auto; }
    .task-grid { display: grid; grid-template-columns: minmax(250px, 1.35fr) repeat(4, minmax(125px, 1fr)); border-top: 1px solid var(--ink); border-left: 1px solid var(--ink); }
    .task-cell { min-width: 0; padding: 10px; border-right: 1px solid var(--ink); border-bottom: 1px solid var(--ink); background: var(--surface); }
    .task-cell.head { background: var(--ink); color: #fff; }
    .task-cell.label { color: var(--ink-2); font-size: 13px; overflow-wrap: anywhere; }
    .task-cell.label b { display: block; color: var(--ink); font-size: 14px; font-weight: 580; }
    .task-cell.label small { display: block; margin-top: 4px; color: var(--ink-2); font-size: 12px; line-height: 1.4; }
    .task-split { display: inline-block; margin-left: 5px; color: var(--ink-3); font-size: 10px; font-weight: 520; text-transform: uppercase; letter-spacing: .04em; }
    .task-result { display: flex; align-items: center; gap: 8px; font-variant-numeric: tabular-nums; }
    .blocks { display: flex; gap: 3px; }
    .blocks i { width: 8px; height: 18px; background: var(--surface-2); }
    .blocks i.pass { background: var(--pass); }
    .blocks i.fail { background: var(--accent); }
    .task-cell.selected-col { background: #fff; color: var(--ink); box-shadow: inset 0 3px 0 var(--accent); }
    .task-cell.head.selected-col { background: var(--ink); color: #fff; box-shadow: inset 0 4px 0 var(--accent); }
    .column-select { width: 100%; border: 0; background: transparent; color: inherit; padding: 0; text-align: left; cursor: pointer; font-weight: 580; }
    .column-select span { opacity: .72; font-size: 11px; }
    .split-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .split-item { border-top: 1px solid var(--ink); padding-top: 9px; }
    .split-item b { font-size: 22px; font-weight: 580; font-variant-numeric: tabular-nums; }
    .split-item span { display: block; color: var(--ink-3); font-size: 12px; }
    .annotation { margin-top: 16px; padding: 12px 14px; background: var(--accent-soft); color: #622211; font-size: 14px; }
    .method-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 28px; border-top: 1px solid var(--ink); padding-top: 18px; }
    .method-grid h3 { font-size: 14px; margin: 0 0 7px; }
    .method-grid p { font-size: 13px; color: var(--ink-2); margin: 0; }
    .stack-heading { margin: 30px 0 10px; font-size: 16px; }
    .stack-list { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--ink); border-left: 1px solid var(--ink); }
    .stack-item { min-width: 0; padding: 12px; border-right: 1px solid var(--ink); border-bottom: 1px solid var(--ink); background: var(--surface); }
    .stack-item b { display: block; margin-bottom: 3px; font-size: 14px; font-weight: 600; }
    .stack-item span { display: block; color: var(--ink-2); font-size: 13px; overflow-wrap: anywhere; }
    .stack-item.missing { background: transparent; }
    .stack-item.missing span { color: var(--ink-3); }
    .stack-source { margin: 10px 0 0; max-width: 75ch; color: var(--ink-3); font-size: 12px; }
    .study-warning { margin-bottom: 18px; padding: 13px 15px; background: var(--blue-soft); color: #17386d; font-size: 14px; }
    .study-warning b { display: block; margin-bottom: 3px; }
    .runtime-shape { color: var(--ink-2); font-size: 12px; line-height: 1.5; white-space: nowrap; }
    .runtime-findings { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; margin-top: 24px; border: 1px solid var(--ink); background: var(--ink); }
    .runtime-finding { padding: 15px; background: var(--surface); }
    .runtime-finding b { display: block; margin-bottom: 5px; font-size: 14px; }
    .runtime-finding p { margin: 0; color: var(--ink-2); font-size: 13px; }
    .harness-layout { display: grid; grid-template-columns: minmax(0, .8fr) minmax(280px, 1.2fr); gap: 24px; align-items: start; }
    .harness-decision { padding: 15px; background: var(--pass-soft); color: #164c3c; }
    .harness-decision b { display: block; margin-bottom: 5px; }
    .harness-decision p { margin: 0; font-size: 13px; }
    .provenance { margin-top: 38px; padding-top: 14px; border-top: 1px solid var(--ink); display: flex; justify-content: space-between; gap: 24px; color: var(--ink-3); font-size: 11px; overflow-wrap: anywhere; }
    .selection-key { display: inline-flex; align-items: center; gap: 7px; margin-top: 5px; color: var(--ink-2); font-weight: 580; }
    .selection-key i { width: 18px; height: 8px; background: var(--accent); }
    [hidden] { display: none !important; }
    .loading { padding: 80px 0; text-align: center; color: var(--ink-3); }
    .loading:before { content: ""; display: inline-block; width: 9px; height: 9px; margin-right: 8px; background: var(--accent); animation: pulse 900ms ease-in-out infinite alternate; }
    @keyframes pulse { to { opacity: .25; } }
    .error { max-width: 700px; margin: 60px auto; padding: 18px; background: var(--accent-soft); color: #622211; }
    @media (max-width: 900px) {
      .run-head { grid-template-columns: 1fr; gap: 22px; }
      .model-selector { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
      .chart-block.wide { grid-column: auto; }
      .task-grid { min-width: 760px; }
      .split-summary { grid-template-columns: repeat(2, 1fr); }
      .method-grid { grid-template-columns: 1fr; gap: 16px; }
      .stack-list { grid-template-columns: repeat(2, 1fr); }
      .runtime-findings, .harness-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 0 14px; }
      .top-meta span:not(:last-child) { display: none; }
      .shell { padding: 18px 14px 48px; }
      .run-head h1 { font-size: 29px; }
      .model-selector { grid-template-columns: 1fr; }
      .section-intro { display: block; }
      .section-intro .reading { text-align: left; margin-top: 8px; }
      .finding { grid-template-columns: 1fr; gap: 6px; }
      .finding p { font-size: 15px; }
      .bar-row { grid-template-columns: 112px minmax(60px, 1fr) 58px; gap: 7px; font-size: 12px; }
      .provenance { display: block; }
      .provenance span { display: block; margin-top: 6px; }
      .stack-list { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *:before, *:after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">local<span>llm</span> / evidence bench</div>
    <div class="top-meta"><span>profile <b>fair-v1-128k-q8</b></span><span>run <b>12 Jul 2026</b></span></div>
  </header>
  <main class="shell" id="app">
    <div class="loading">Loading normalized benchmark data</div>
  </main>
  <script>
    const state = { data: null, runtimeData: null, selected: 'qwen27-huihui', view: 'overview' };
    const colors = ['#e34b24', '#1556b8', '#00745b', '#9a2f78'];
    const taskDefinitions = {
      tools: {
        tool_restraint: ['Tool restraint', 'Answers directly when the prompt explicitly says not to use a tool.', 'core'],
        tool_followthrough: ['Evidence follow-through', 'Calls the required lookup and carries its returned value into the final answer.', 'core'],
        dependent_tool_sequence: ['Dependent sequence', 'Uses the first tool result as the exact input to a second tool call.', 'core'],
        parallel_tool_calls: ['Parallel calls', 'Issues two independent lookups together and reports both results.', 'core'],
        tool_error_recovery: ['Error recovery', 'Recognizes a failed primary lookup, switches to the fallback, and completes the answer.', 'core'],
        duplicate_call_avoidance: ['Duplicate avoidance', 'Uses the requested lookup exactly once without repeating an already-completed call.', 'holdout'],
        tool_restraint_holdout: ['Tool restraint', 'Unseen prompt that must be answered without invoking any tool.', 'holdout'],
      },
      sandbox: {
        normalize_tags: ['Normalize tags', 'Single-file fix: trim, remove blanks, lowercase, and preserve tag order.', 'core'],
        merge_intervals: ['Merge intervals', 'Single-file fix: sort and merge overlapping or touching integer ranges.', 'core'],
        retry_limit: ['Retry limit', 'Implement exact retry counts and re-raise the final exception after exhaustion.', 'core'],
        pricing_repository: ['Pricing repository', 'Discover and repair discount logic across two files without changing tests.', 'core'],
        transient_test_recovery: ['Transient recovery', 'Fix a parser, recover from an injected test-runner failure, and rerun tests.', 'core'],
        duration_format: ['Duration format', 'Unseen single-file task formatting non-negative seconds as compact h/m/s text.', 'holdout'],
        config_overlay: ['Config overlay', 'Unseen multi-file task resolving explicit timeouts with a default fallback.', 'holdout'],
        package_summary: ['Package summary', 'Unseen package-discovery task with an exact one-file change boundary.', 'holdout'],
      },
    };
    const prettyTask = value => value.replaceAll('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
    const format = (value, digits = 1) => value == null ? '—' : Number(value).toFixed(digits);
    const pct = item => item.total ? item.passed / item.total * 100 : 0;
    const modelShort = m => `${m.name.replace('Qwen 3.6 ', '')} · ${m.build} · ${m.quant}`;

    function ratio(value) {
      const good = value.passed === value.total;
      return `<span class="ratio" title="${value.passed} passing trials out of ${value.total} retained attempts" aria-label="${value.passed} passing trials out of ${value.total} retained attempts"><span class="mini-track"><i class="${good ? '' : 'partial'}" style="width:${pct(value)}%"></i></span><b>${value.passed}/${value.total}</b></span>`;
    }

    function modelSelector() {
      return `<div class="selector-label"><span>Compare ${state.data.models.length} builds</span><span>Selection follows you through every suite</span></div>
        <div class="model-selector" aria-label="Select model">${state.data.models.map(m => `
          <button class="model-button ${m.id === state.selected ? 'active' : ''}" data-model-select="${m.id}" aria-pressed="${m.id === state.selected}">
            <span class="build">${m.build} · ${m.quant}</span><span class="name">${m.name}</span>
            <span class="model-foot"><span>${m.family}</span><span>${m.modelSizeGb} GB</span></span>
          </button>`).join('')}</div>`;
    }

    function suiteNav() {
      const tabs = [['overview','Readout'],['performance','Performance'],['runtime','Runtime'],['tools','Tools'],['sandbox','Sandbox'],['concurrency','Concurrency'],['vision','Vision'],['method','Method']];
      return `<nav class="suite-nav" aria-label="Benchmark family">${tabs.map(([id,label]) => `<button class="suite-tab ${state.view === id ? 'active' : ''}" data-view="${id}" aria-selected="${state.view === id}">${label}</button>`).join('')}</nav>`;
    }

    function overview() {
      return `<section class="view ${state.view === 'overview' ? 'active' : ''}" id="view-overview">
        <div class="section-intro"><div><h2>Qualification readout</h2><p>Completion and capability are reported independently. There is deliberately no aggregate score.</p></div><p class="reading">Every fraction is passing trials / retained attempts. Tools: 7 tasks × 3 attempts. Sandbox: 8 × 3. Concurrency: 2 × 5. Vision: 1 × 3.</p></div>
        <div class="matrix-scroll"><table class="matrix"><thead><tr><th>Candidate</th><th>Release</th><th>Performance</th><th>Tools</th><th>Sandbox</th><th>Concurrency</th><th>Vision</th></tr></thead><tbody>
          ${state.data.models.map(m => `<tr data-model="${m.id}" class="${m.id === state.selected ? 'selected' : ''}" tabindex="0" role="button" aria-label="Select ${m.name} ${m.build} ${m.quant}"><td class="model-cell"><b>${m.name}</b><small>${m.build} · ${m.quant} · ${m.modelSizeGb} GB</small></td><td><span class="status-word fail">Not qualified</span></td><td><span class="status-word">Completed</span></td><td>${ratio(m.tools)}</td><td>${ratio(m.sandbox)}</td><td>${ratio(m.concurrency)}</td><td>${ratio(m.vision)}</td></tr>`).join('')}
        </tbody></table></div>
        <div class="finding"><h3>What this run says</h3><p>${state.data.interpretation.finding}</p></div>
        <div class="finding"><h3>What it does not say</h3><p>It does not collapse unlike workloads into a winner. The 35B MoE builds are roughly four times faster in generation; the 27B builds complete more sandbox trials. Tool, concurrency, and vision results are tied.</p></div>
      </section>`;
    }

    function bars(metric, label, unit, inverse = false) {
      const values = state.data.models.map(m => m.performance[metric].median);
      const max = Math.max(...values);
      return `<div class="chart-block"><div class="chart-head"><h3>${label}</h3><span>median · ${unit}</span></div><div class="bar-list">${state.data.models.map((m,i) => {
        const v = m.performance[metric].median;
        return `<div class="bar-row ${m.id === state.selected ? 'selected' : ''}" data-model-row="${m.id}"><span class="bar-label">${modelShort(m)}</span><div class="bar-track"><div class="bar-fill" style="transform:scaleX(${v / max})"></div></div><span class="bar-value">${format(v, inverse ? 3 : 1)}</span></div>`;
      }).join('')}</div></div>`;
    }

    function contextChart() {
      const width=900,height=270,left=56,right=22,top=20,bottom=36, max=2800;
      const contexts=['8k','32k','64k','120k'];
      const x=i=>left+i*((width-left-right)/(contexts.length-1));
      const y=v=>top+(max-v)/max*(height-top-bottom);
      const grid=[0,700,1400,2100,2800];
      return `<div class="chart-block wide"><div class="chart-head"><h3>Context recall prompt processing</h3><span>median prompt tok/s · exact prompt count retained in data</span></div>
        <svg class="context-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Prompt processing speed across context lengths">${grid.map(v=>`<line class="gridline" x1="${left}" y1="${y(v)}" x2="${width-right}" y2="${y(v)}"/><text class="axis-text" x="4" y="${y(v)+4}">${v}</text>`).join('')}${contexts.map((v,i)=>`<text class="axis-text" text-anchor="middle" x="${x(i)}" y="${height-8}">${v}</text>`).join('')}${state.data.models.map((m,mi)=>{const points=m.performance.contextRecall.map((d,i)=>`${x(i)},${y(d.promptPerSecond.median)}`).join(' ');return `<polyline data-model-series="${m.id}" class="line" points="${points}" stroke="${colors[mi]}" ${m.build==='Unsloth'?'stroke-dasharray="8 5"':''} opacity="${m.id===state.selected?1:.72}"/>${m.performance.contextRecall.map((d,i)=>`<circle data-model-series="${m.id}" class="point" cx="${x(i)}" cy="${y(d.promptPerSecond.median)}" r="${m.id===state.selected?5:4}" fill="${colors[mi]}"/>`).join('')}`}).join('')}</svg>
        <div class="legend">${state.data.models.map((m,i)=>`<button data-model-select="${m.id}"><i class="${m.build==='Unsloth'?'dashed':''}" style="background:${colors[i]};border-color:${colors[i]}"></i>${modelShort(m)}</button>`).join('')}</div></div>`;
    }

    function performance() {
      return `<section class="view ${state.view === 'performance' ? 'active' : ''}" id="view-performance"><div class="section-intro"><div><h2>Performance</h2><p>Repeated prompt processing, generation, agent-shaped streaming, cache reuse, and long-context recall.</p></div><p class="reading">Higher is better except TTFT. Figures are medians across five fair-profile repeats.<span class="selection-key"><i></i>Orange marks the selected model.</span></p></div><div class="chart-grid">${bars('directGeneration','Direct generation','tok/s')}${bars('agentTtft','Agent-shaped TTFT','seconds',true)}${bars('referenceAgent','Reference agent loop','tok/s')}${bars('coldPrompt','Cold short-prompt processing','tok/s')}${contextChart()}</div></section>`;
    }

    function runtimeBars(metric, label, unit) {
      const models = state.runtimeData.models;
      const max = Math.max(...models.map(model => model.metrics[metric]));
      return `<div class="chart-block"><div class="chart-head"><h3>${label}</h3><span>retained profile · ${unit}</span></div><div class="bar-list">${models.map(model => {
        const value = model.metrics[metric];
        return `<div class="bar-row ${model.id === state.selected ? 'selected' : ''}" data-model-row="${model.id}"><span class="bar-label">${modelShort(model)}</span><div class="bar-track"><div class="bar-fill" style="transform:scaleX(${value / max})"></div></div><span class="bar-value">${format(value, 1)}</span></div>`;
      }).join('')}</div></div>`;
    }

    function runtime() {
      const tuning = state.runtimeData;
      const correction = tuning.models.find(model => model.validation.performance.correction);
      return `<section class="view ${state.view === 'runtime' ? 'active' : ''}" id="view-runtime">
        <div class="section-intro"><div><h2>Runtime tuning</h2><p>Retained deployment shapes from a controlled tuning campaign completed 14 July 2026.</p></div><p class="reading">${tuning.interpretation.scope}</p></div>
        <div class="study-warning"><b>Model-specific profiles—not a fair ranking</b>${tuning.interpretation.warning}</div>
        <div class="matrix-scroll"><table class="matrix"><thead><tr><th>Candidate</th><th>Context tokens</th><th>Runtime shape</th><th>Long PP · tok/s</th><th>Deterministic TG · tok/s</th><th>Sampled TG · tok/s</th><th>Tool TG · tok/s</th></tr></thead><tbody>${tuning.models.map(model => {
          const profile = model.profile;
          const speculation = profile.speculation === 'none' ? 'no speculation' : `draft-MTP n${profile.mtpN}`;
          return `<tr data-model="${model.id}" class="${model.id === state.selected ? 'selected' : ''}" tabindex="0" role="button" aria-label="Select ${model.name} ${model.build} ${model.quant}"><td class="model-cell"><b>${model.name}</b><small>${model.build} · ${model.quant}</small></td><td><b>${profile.context.toLocaleString('en-US')}</b></td><td class="runtime-shape">b${profile.batch} / u${profile.ubatch}<br>t${profile.threads} / tb${profile.threadsBatch} · ${speculation}</td><td><b>${format(model.metrics.longPrompt, 1)}</b></td><td>${format(model.metrics.deterministicGeneration, 1)}</td><td>${format(model.metrics.sampledGeneration, 1)}</td><td>${format(model.metrics.toolGeneration, 1)}</td></tr>`;
        }).join('')}</tbody></table></div>
        <div class="chart-grid" style="margin-top:18px">${runtimeBars('longPrompt','Long prompt processing','prompt tok/s')}${runtimeBars('sampledGeneration','Sampled agent generation','tok/s')}</div>
        <div class="runtime-findings">${tuning.findings.map(finding => `<article class="runtime-finding"><b>${finding.title}</b><p>${finding.detail}</p></article>`).join('')}</div>
        <h3 class="stack-heading">Finalist validation</h3><div class="section-intro" style="margin-bottom:12px"><p>Performance, tool, and vision validation only. Sandbox and concurrency were not rerun in this campaign.</p></div>
        <div class="matrix-scroll"><table class="matrix"><thead><tr><th>Candidate</th><th>Performance passes · raw</th><th>Performance passes · derived</th><th>Tool passes</th><th>Vision passes</th></tr></thead><tbody>${tuning.models.map(model => `<tr data-model="${model.id}" class="${model.id === state.selected ? 'selected' : ''}" tabindex="0" role="button" aria-label="Select ${model.name} ${model.build} ${model.quant}"><td class="model-cell"><b>${model.name}</b><small>${model.build} · ${model.quant}</small></td><td>${model.validation.performance.rawPassed}/${model.validation.performance.total}</td><td><b>${model.validation.performance.derivedPassed}/${model.validation.performance.total}</b></td><td>${model.validation.tools.passed}/${model.validation.tools.total}</td><td>${model.validation.vision.passed}/${model.validation.vision.total}</td></tr>`).join('')}</tbody></table></div>
        <div class="annotation"><b>${correction.name} ${correction.build} cache grading:</b> ${correction.validation.performance.correction}</div>
        <h3 class="stack-heading">Bespoke agent-harness A/B</h3><div class="harness-layout"><div class="matrix-scroll"><table class="matrix" style="min-width:0"><thead><tr><th>Arm</th><th>Task passes</th><th>Median elapsed</th></tr></thead><tbody>${tuning.agentHarness.arms.map(arm => `<tr><td><b>${arm.label}</b></td><td>${arm.taskPassed}/${arm.taskTotal}</td><td>${format(arm.medianElapsedSeconds, 2)}s</td></tr>`).join('')}</tbody></table></div><div class="harness-decision"><b>Retain ${tuning.agentHarness.selectedShape}</b><p>The finalist was ${format(tuning.agentHarness.finalistElapsedChangePercent, 1)}% slower with the same task result. ${tuning.agentHarness.commonFinding}</p></div></div>
        <h3 class="stack-heading">Campaign integrity</h3><div class="stack-list"><div class="stack-item"><b>Direct measurements</b><span>${tuning.integrity.validMeasurements}/${tuning.integrity.attemptedMeasurements} valid · ${tuning.integrity.expectedStartupFailures} expected unsupported startups</span></div><div class="stack-item"><b>Controls</b><span>${tuning.integrity.controlPassed}/${tuning.integrity.controlTrials} passed</span></div><div class="stack-item"><b>Excluded runs</b><span>${tuning.integrity.excludedRuns} · ${tuning.integrity.excludedReasons.join('; ')}</span></div><div class="stack-item"><b>Safety</b><span>${tuning.agentHarness.safety.completedRuns} guarded runs · no safety fault · environment restored</span></div></div>
      </section>`;
    }

    function taskMatrix(kind) {
      const tasks = Object.keys(state.data.models[0][kind].tasks);
      return `<div class="task-scroll"><div class="task-grid"><div class="task-cell head">Task and acceptance target</div>${state.data.models.map(m=>`<div class="task-cell head ${m.id===state.selected?'selected-col':''}" data-model-column="${m.id}"><button class="column-select" data-model-select="${m.id}">${m.build} · ${m.quant}<br><span>${m.family.split(' · ')[0]} · select model</span></button></div>`).join('')}${tasks.map(task=>{const [name,description,split]=taskDefinitions[kind][task]||[prettyTask(task),'Retained benchmark task.',''];return `<div class="task-cell label"><b>${name}<span class="task-split">${split}</span></b><small>${description}</small></div>${state.data.models.map(m=>{const r=m[kind].tasks[task];return `<div class="task-cell ${m.id===state.selected?'selected-col':''}" data-model-column="${m.id}"><div class="task-result"><span class="blocks" aria-hidden="true">${Array.from({length:r.total},(_,i)=>`<i class="${i<r.passed?'pass':'fail'}"></i>`).join('')}</span><b title="${r.passed} passing trials out of ${r.total} attempts">${r.passed}/${r.total}</b></div></div>`}).join('')}`}).join('')}</div></div>`;
    }

    function qualityView(kind, title, copy) {
      const selected = state.data.models.find(m=>m.id===state.selected);
      const annotations = state.data.models.map(m=>m.notes.length?`<div class="annotation" data-model-note="${m.id}" ${m.id===state.selected?'':'hidden'}><b>Retained evidence note:</b> ${m.notes.join(' ')}</div>`:'').join('');
      const attemptCopy = kind === 'tools' ? 'Seven tasks, each attempted three times: five core tasks (15 attempts) plus two unseen holdouts (6 attempts).' : 'Eight coding tasks, each attempted three times: five core tasks (15 attempts) plus three unseen holdouts (9 attempts).';
      return `<section class="view ${state.view === kind ? 'active' : ''}" id="view-${kind}"><div class="section-intro"><div><h2>${title}</h2><p>${copy}</p></div><p class="reading">${attemptCopy} Every fraction is passing trials / total attempts.</p></div><div class="split-summary">${state.data.models.map(m=>`<div class="split-item"><b>${m[kind].passed}/${m[kind].total}</b><span>${modelShort(m)} · passing trials / attempts</span></div>`).join('')}</div>${taskMatrix(kind)}${annotations}</section>`;
    }

    function smallSuite(kind, title, copy) {
      const tasks = kind === 'concurrency' ? Object.keys(state.data.models[0].concurrency.reliability) : [];
      const trialCopy = kind === 'concurrency' ? 'Two workload types, each repeated five times. 10/10 means all ten retained attempts passed.' : 'One deterministic 1024×1024 quadrant-image task repeated three times. 3/3 means all three attempts passed.';
      return `<section class="view ${state.view === kind ? 'active' : ''}" id="view-${kind}"><div class="section-intro"><div><h2>${title}</h2><p>${copy}</p></div><p class="reading">${trialCopy}</p></div><div class="matrix-scroll"><table class="matrix"><thead><tr><th>Candidate</th><th>Applicable</th><th>Passing trials / attempts</th>${tasks.map(t=>`<th>${prettyTask(t)} · 5 attempts</th>`).join('')}</tr></thead><tbody>${state.data.models.map(m=>{const s=m[kind];return `<tr data-model="${m.id}" class="${m.id===state.selected?'selected':''}" tabindex="0" role="button" aria-label="Select ${m.name} ${m.build} ${m.quant}"><td class="model-cell"><b>${m.name}</b><small>${m.build} · ${m.quant}</small></td><td>${s.applicable?'Yes':'No'}</td><td>${ratio(s)}</td>${tasks.map(t=>`<td>${ratio(s.reliability[t])}</td>`).join('')}</tr>`}).join('')}</tbody></table></div></section>`;
    }

    function method() {
      const d=state.data.models[0], stack=state.data.testStack;
      return `<section class="view ${state.view === 'method' ? 'active' : ''}" id="view-method"><div class="section-intro"><div><h2>Method & provenance</h2><p>Enough context to interpret the results without reproducing raw benchmark artifacts.</p></div></div><div class="method-grid"><div><h3>Fair profile</h3><p>All candidates used ${d.profile.id}: fixed 128k context, q8 KV, Q6_K model weights, five performance repeats, three quality repeats, and holdout tasks enabled.</p></div><div><h3>Runtime tuning</h3><p>Retained profiles use model-specific contexts and runtime shapes. They explain deployment choices and remain separate from fair-profile ranking evidence.</p></div><div><h3>Qualification</h3><p>${state.data.interpretation.releaseMeaning} All required suites must pass every strict release requirement.</p></div><div><h3>Separate production evidence</h3><p>A bespoke agent harness measures end-to-end production behavior. Those outcomes are intentionally not compared with fair model/runtime measurements.</p></div></div><h3 class="stack-heading">Recorded test stack</h3><div class="stack-list"><div class="stack-item"><b>GPU</b><span>${stack.hardware.gpu} · ${stack.hardware.gpuMemoryGb} GB</span></div><div class="stack-item"><b>CPU</b><span>AMD Ryzen 9 3900X · 12 cores / 24 threads</span></div><div class="stack-item"><b>System memory</b><span>32 GB DDR4 · 4 × 8 GB</span></div><div class="stack-item"><b>Inference runtime</b><span>${stack.runtime.name} build ${stack.runtime.build} · ${stack.runtime.commit}</span></div><div class="stack-item"><b>Backend</b><span>${stack.runtime.backend} · full GPU offload required</span></div><div class="stack-item"><b>GPU probe</b><span>${stack.runtime.gpuProbe} SMI · driver ${stack.runtime.gpuDriver}</span></div><div class="stack-item"><b>Host platform</b><span>${stack.runtime.platform}</span></div><div class="stack-item"><b>Compiler target</b><span>${stack.runtime.compiler}</span></div></div><p class="stack-source">GPU identity and capacity come from BENCHMARK_RESULTS.md. Runtime and platform values come from the canonical summary. CPU topology and installed memory were inspected directly on the benchmark host.</p><div class="finding"><h3>Data policy</h3><p>${state.data.interpretation.separation}</p></div></section>`;
    }

    function render() {
      const d=state.data;
      const qualified=d.models.filter(model=>model.release.passed).length;
      const updated=new Date(state.runtimeData.source.generatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
      const scopeMeta=state.view==='runtime'?`study <b>runtime-tuning-v1</b>`:`profile <b>${d.models[0].profile.id}</b>`;
      document.querySelector('.top-meta').innerHTML=`<span>${scopeMeta}</span><span>updated <b>${updated}</b></span>`;
      document.getElementById('app').innerHTML = `<section class="run-head"><div><div class="overline">Barrage V2 / release evidence</div><h1>${d.models.length} builds. Separate questions.</h1><p>${d.interpretation.separation}</p></div><div class="gate-note"><span class="gate-mark" aria-hidden="true">×</span><div><b>${qualified} of ${d.models.length} release-qualified</b><p>${d.interpretation.releaseMeaning}</p></div></div></section>${modelSelector()}${suiteNav()}${overview()}${performance()}${runtime()}${qualityView('tools','Tool contract','Executable restraint, exact arguments, dependent sequences, recovery, duplicate avoidance, and evidence use.')}${qualityView('sandbox','Sandbox coding','Disposable coding tasks graded on acceptance, exact file scope, test execution, and recovery behavior.')}${smallSuite('concurrency','Concurrency','Two simultaneous generations and mixed prefill/generation contention.')}${smallSuite('vision','Vision','Deterministic image ingestion and multimodal decoding task.')}${method()}<footer class="provenance"><b>Normalized from ${d.source.schemaVersion} · ${d.source.label}</b><span>Runtime study · ${state.runtimeData.source.label}</span></footer>`;
      bind();
    }

    function selectModel(modelId) {
      state.selected = modelId;
      document.querySelectorAll('.model-button[data-model-select]').forEach(el => {
        const selected = el.dataset.modelSelect === modelId;
        el.classList.toggle('active', selected);
        el.setAttribute('aria-pressed', selected);
      });
      document.querySelectorAll('tr[data-model]').forEach(el => el.classList.toggle('selected', el.dataset.model === modelId));
      document.querySelectorAll('[data-model-row]').forEach(el => el.classList.toggle('selected', el.dataset.modelRow === modelId));
      document.querySelectorAll('[data-model-column]').forEach(el => el.classList.toggle('selected-col', el.dataset.modelColumn === modelId));
      document.querySelectorAll('[data-model-note]').forEach(el => el.hidden = el.dataset.modelNote !== modelId);
      document.querySelectorAll('[data-model-series]').forEach(el => {
        const selected = el.dataset.modelSeries === modelId;
        if (el.tagName === 'polyline') el.setAttribute('opacity', selected ? '1' : '.62');
        if (el.tagName === 'circle') el.setAttribute('r', selected ? '5' : '4');
      });
    }

    function bind() {
      document.querySelectorAll('[data-model-select]').forEach(el=>el.addEventListener('click',()=>selectModel(el.dataset.modelSelect)));
      document.querySelectorAll('tr[data-model]').forEach(el=>{
        el.addEventListener('click',()=>selectModel(el.dataset.model));
        el.addEventListener('keydown',event=>{if(event.key==='Enter'||event.key===' '){event.preventDefault();selectModel(el.dataset.model)}});
      });
      document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>{state.view=el.dataset.view;render();document.querySelector('.suite-nav').scrollIntoView({block:'start'})}));
    }

    Promise.all(['data/barrage-v2.json','data/runtime-tuning-v1.json'].map(path=>fetch(path).then(r=>{if(!r.ok)throw new Error(`${path}: HTTP ${r.status}`);return r.json()}))).then(([data,runtimeData])=>{state.data=data;state.runtimeData=runtimeData;render()}).catch(error=>{
      document.getElementById('app').innerHTML=`<div class="error"><b>Benchmark data could not be loaded.</b><p>${error.message}. Serve this directory over HTTP so the normalized JSON is available.</p></div>`;
    });
  </script>
</body>
</html>
