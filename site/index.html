<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Local LLM research, benchmark evidence, and testing notes.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>localllm — benchmark evidence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:CRSV,SHRP,slnt,wght@0..1,0..100,-12..0,300..700&display=swap');
    :root {
      --canvas: #e9eced;
      --surface: #f7f8f7;
      --surface-2: #dde2e3;
      --ink: #172027;
      --ink-2: #46545d;
      --ink-3: #66747c;
      --rule: #b8c0c3;
      --strong-rule: #7d898f;
      --accent: #e34b24;
      --accent-soft: #f7d8d0;
      --pass: #167257;
      --pass-soft: #d5e9e2;
      --warn: #a43c24;
      --blue: #245bb8;
      --blue-soft: #dce5f5;
      --focus: #005fcc;
      --header-h: 54px;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--canvas);
      color: var(--ink);
      font-family: Geologica, "Arial Narrow", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      font-variation-settings: "SHRP" 35;
    }
    button { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }
    button:focus-visible, a:focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; }
    .topbar {
      height: var(--header-h);
      border-bottom: 1px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 24px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .brand { font-size: 18px; font-weight: 650; letter-spacing: -.03em; white-space: nowrap; }
    .brand span { color: var(--accent); }
    .top-meta { display: flex; gap: 18px; color: var(--ink-3); font-size: 11px; font-variant-numeric: tabular-nums; }
    .top-meta b { color: var(--ink); font-weight: 520; }
    .shell { max-width: 1500px; margin: 0 auto; padding: 26px 28px 72px; }
    .run-head {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(330px, .65fr);
      gap: 36px;
      align-items: end;
      padding: 8px 0 26px;
      border-bottom: 1px solid var(--ink);
    }
    .run-head h1 { margin: 5px 0 8px; font-size: 36px; line-height: 1.02; letter-spacing: -.035em; text-wrap: balance; }
    .run-head p { max-width: 68ch; margin: 0; color: var(--ink-2); text-wrap: pretty; }
    .overline { color: var(--ink-3); font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
    .gate-note { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: start; }
    .gate-mark { width: 34px; height: 34px; display: grid; place-items: center; background: var(--accent); color: #fff; font-size: 18px; font-weight: 650; }
    .gate-note b { display: block; margin-bottom: 3px; font-size: 15px; }
    .gate-note p { font-size: 12px; color: var(--ink-2); }
    .selector-label { margin: 24px 0 8px; display: flex; justify-content: space-between; color: var(--ink-3); font-size: 11px; }
    .model-selector { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--ink); background: var(--ink); gap: 1px; }
    .model-button {
      border: 0;
      background: var(--surface);
      color: var(--ink);
      text-align: left;
      padding: 13px 14px 12px;
      cursor: pointer;
      min-width: 0;
      transition: background 180ms var(--ease), color 180ms var(--ease);
    }
    .model-button:hover { background: #fff; }
    .model-button.active { background: var(--ink); color: #fff; }
    .model-button .build { color: var(--accent); font-size: 11px; font-weight: 650; }
    .model-button .name { display: block; margin: 2px 0 7px; font-size: 15px; font-weight: 580; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .model-button .model-foot { display: flex; justify-content: space-between; gap: 6px; font-size: 10px; color: var(--ink-3); }
    .model-button.active .model-foot { color: #aeb9bf; }
    .suite-nav {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      border-bottom: 1px solid var(--ink);
      margin-top: 28px;
      scrollbar-width: none;
    }
    .suite-nav::-webkit-scrollbar { display: none; }
    .suite-tab { border: 0; background: transparent; padding: 10px 13px; color: var(--ink-3); white-space: nowrap; cursor: pointer; border-bottom: 3px solid transparent; }
    .suite-tab:hover { color: var(--ink); }
    .suite-tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 580; }
    .view { display: none; padding-top: 26px; }
    .view.active { display: block; animation: view-in 180ms var(--ease); }
    @keyframes view-in { from { opacity: .4; transform: translateY(4px); } }
    .section-intro { display: flex; justify-content: space-between; align-items: end; gap: 36px; margin-bottom: 18px; }
    .section-intro h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: -.025em; }
    .section-intro p { color: var(--ink-2); margin: 0; max-width: 66ch; font-size: 12px; }
    .section-intro .reading { max-width: 360px; text-align: right; color: var(--ink-3); }
    .matrix-scroll { overflow-x: auto; border-top: 1px solid var(--ink); }
    .matrix { width: 100%; border-collapse: collapse; min-width: 860px; font-variant-numeric: tabular-nums; }
    .matrix th { padding: 9px 10px; border-bottom: 1px solid var(--strong-rule); text-align: left; font-size: 10px; color: var(--ink-3); font-weight: 580; text-transform: uppercase; letter-spacing: .055em; }
    .matrix td { padding: 11px 10px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
    .matrix tr[data-model] { cursor: pointer; }
    .matrix tr[data-model]:hover td { background: rgba(255,255,255,.44); }
    .matrix tr.selected td { background: var(--surface); }
    .matrix tr.selected td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
    .model-cell b { display: block; font-weight: 580; }
    .model-cell small { color: var(--ink-3); }
    .ratio { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
    .ratio b { font-weight: 600; }
    .mini-track { width: 54px; height: 6px; background: var(--surface-2); }
    .mini-track i { display: block; height: 100%; background: var(--pass); }
    .mini-track i.partial { background: var(--accent); }
    .status-word { color: var(--pass); font-size: 11px; font-weight: 600; }
    .status-word.fail { color: var(--warn); }
    .finding {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 155px minmax(0, 1fr);
      gap: 24px;
      border-top: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      padding: 16px 0;
    }
    .finding h3 { margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    .finding p { margin: 0; font-size: 17px; line-height: 1.35; max-width: 76ch; text-wrap: pretty; }
    .chart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1px; background: var(--ink); border: 1px solid var(--ink); }
    .chart-block { background: var(--surface); padding: 17px; min-width: 0; }
    .chart-block.wide { grid-column: 1 / -1; }
    .chart-head { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
    .chart-head h3 { margin: 0; font-size: 14px; font-weight: 580; }
    .chart-head span { color: var(--ink-3); font-size: 10px; }
    .bar-list { display: grid; gap: 11px; }
    .bar-row { display: grid; grid-template-columns: 130px minmax(80px, 1fr) 72px; align-items: center; gap: 10px; font-size: 11px; }
    .bar-row.selected .bar-label { color: var(--accent); font-weight: 650; }
    .bar-track { height: 18px; background: var(--surface-2); position: relative; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--blue); transform-origin: left; transition: transform 260ms var(--ease), background 180ms; }
    .bar-row.selected .bar-fill { background: var(--accent); }
    .bar-value { text-align: right; font-variant-numeric: tabular-nums; font-weight: 580; }
    .context-chart { width: 100%; height: auto; min-height: 240px; display: block; }
    .context-chart .gridline { stroke: var(--rule); stroke-width: 1; }
    .context-chart .axis-text { fill: var(--ink-3); font: 10px Geologica, sans-serif; }
    .context-chart .line { fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
    .context-chart .point { stroke: var(--surface); stroke-width: 2; vector-effect: non-scaling-stroke; }
    .legend { display: flex; flex-wrap: wrap; gap: 13px; margin-top: 10px; }
    .legend button { border: 0; background: transparent; padding: 3px 0; color: var(--ink-2); cursor: pointer; font-size: 10px; }
    .legend i { display: inline-block; width: 16px; height: 3px; margin-right: 6px; vertical-align: middle; }
    .task-grid { display: grid; grid-template-columns: minmax(190px, 1.25fr) repeat(4, minmax(105px, 1fr)); border-top: 1px solid var(--ink); border-left: 1px solid var(--ink); overflow-x: auto; }
    .task-cell { min-width: 0; padding: 10px; border-right: 1px solid var(--ink); border-bottom: 1px solid var(--ink); background: var(--surface); }
    .task-cell.head { background: var(--ink); color: #fff; }
    .task-cell.label { color: var(--ink-2); font-size: 11px; overflow-wrap: anywhere; }
    .task-result { display: flex; align-items: center; gap: 8px; font-variant-numeric: tabular-nums; }
    .blocks { display: flex; gap: 3px; }
    .blocks i { width: 8px; height: 18px; background: var(--surface-2); }
    .blocks i.pass { background: var(--pass); }
    .blocks i.fail { background: var(--accent); }
    .task-cell.selected-col { background: #fff; box-shadow: inset 0 3px 0 var(--accent); }
    .split-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .split-item { border-top: 1px solid var(--ink); padding-top: 9px; }
    .split-item b { font-size: 22px; font-weight: 580; font-variant-numeric: tabular-nums; }
    .split-item span { display: block; color: var(--ink-3); font-size: 10px; }
    .annotation { margin-top: 16px; padding: 12px 14px; background: var(--accent-soft); color: #622211; font-size: 12px; }
    .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; border-top: 1px solid var(--ink); padding-top: 18px; }
    .method-grid h3 { font-size: 12px; margin: 0 0 7px; }
    .method-grid p { font-size: 11px; color: var(--ink-2); margin: 0; }
    .provenance { margin-top: 38px; padding-top: 14px; border-top: 1px solid var(--ink); display: flex; justify-content: space-between; gap: 24px; color: var(--ink-3); font-size: 10px; overflow-wrap: anywhere; }
    .loading { padding: 80px 0; text-align: center; color: var(--ink-3); }
    .loading:before { content: ""; display: inline-block; width: 9px; height: 9px; margin-right: 8px; background: var(--accent); animation: pulse 900ms ease-in-out infinite alternate; }
    @keyframes pulse { to { opacity: .25; } }
    .error { max-width: 700px; margin: 60px auto; padding: 18px; background: var(--accent-soft); color: #622211; }
    @media (max-width: 900px) {
      .run-head { grid-template-columns: 1fr; gap: 22px; }
      .model-selector { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
      .chart-block.wide { grid-column: auto; }
      .task-grid { min-width: 760px; }
      .split-summary { grid-template-columns: repeat(2, 1fr); }
      .method-grid { grid-template-columns: 1fr; gap: 16px; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 0 14px; }
      .top-meta span:not(:last-child) { display: none; }
      .shell { padding: 18px 14px 48px; }
      .run-head h1 { font-size: 29px; }
      .model-selector { grid-template-columns: 1fr; }
      .section-intro { display: block; }
      .section-intro .reading { text-align: left; margin-top: 8px; }
      .finding { grid-template-columns: 1fr; gap: 6px; }
      .finding p { font-size: 15px; }
      .bar-row { grid-template-columns: 100px minmax(60px, 1fr) 58px; gap: 7px; }
      .provenance { display: block; }
      .provenance span { display: block; margin-top: 6px; }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *:before, *:after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">local<span>llm</span> / evidence bench</div>
    <div class="top-meta"><span>profile <b>fair-v1-128k-q8</b></span><span>run <b>12 Jul 2026</b></span></div>
  </header>
  <main class="shell" id="app">
    <div class="loading">Loading normalized benchmark data</div>
  </main>
  <script>
    const state = { data: null, selected: 'qwen27-huihui', view: 'overview' };
    const colors = ['#e34b24', '#245bb8', '#167257', '#6c4dab'];
    const prettyTask = value => value.replaceAll('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
    const format = (value, digits = 1) => value == null ? '—' : Number(value).toFixed(digits);
    const pct = item => item.total ? item.passed / item.total * 100 : 0;
    const modelShort = m => `${m.name.replace('Qwen 3.6 ', '')} · ${m.build}`;

    function ratio(value) {
      const good = value.passed === value.total;
      return `<span class="ratio"><span class="mini-track"><i class="${good ? '' : 'partial'}" style="width:${pct(value)}%"></i></span><b>${value.passed}/${value.total}</b></span>`;
    }

    function modelSelector() {
      return `<div class="selector-label"><span>Compare four builds</span><span>Selection follows you through every suite</span></div>
        <div class="model-selector" aria-label="Select model">${state.data.models.map(m => `
          <button class="model-button ${m.id === state.selected ? 'active' : ''}" data-model-select="${m.id}" aria-pressed="${m.id === state.selected}">
            <span class="build">${m.build}</span><span class="name">${m.name}</span>
            <span class="model-foot"><span>${m.family}</span><span>${m.modelSizeGb} GB</span></span>
          </button>`).join('')}</div>`;
    }

    function suiteNav() {
      const tabs = [['overview','Readout'],['performance','Performance'],['tools','Tools'],['sandbox','Sandbox'],['concurrency','Concurrency'],['vision','Vision'],['method','Method']];
      return `<nav class="suite-nav" aria-label="Benchmark family">${tabs.map(([id,label]) => `<button class="suite-tab ${state.view === id ? 'active' : ''}" data-view="${id}" aria-selected="${state.view === id}">${label}</button>`).join('')}</nav>`;
    }

    function overview() {
      return `<section class="view ${state.view === 'overview' ? 'active' : ''}" id="view-overview">
        <div class="section-intro"><div><h2>Qualification readout</h2><p>Completion and capability are reported independently. There is deliberately no aggregate score.</p></div><p class="reading">Green means every retained trial passed. Orange is a partial result, not a benchmark crash.</p></div>
        <div class="matrix-scroll"><table class="matrix"><thead><tr><th>Candidate</th><th>Release</th><th>Performance</th><th>Tools</th><th>Sandbox</th><th>Concurrency</th><th>Vision</th></tr></thead><tbody>
          ${state.data.models.map(m => `<tr data-model="${m.id}" class="${m.id === state.selected ? 'selected' : ''}"><td class="model-cell"><b>${m.name}</b><small>${m.build} · ${m.modelSizeGb} GB</small></td><td><span class="status-word fail">Not qualified</span></td><td><span class="status-word">Completed</span></td><td>${ratio(m.tools)}</td><td>${ratio(m.sandbox)}</td><td>${ratio(m.concurrency)}</td><td>${ratio(m.vision)}</td></tr>`).join('')}
        </tbody></table></div>
        <div class="finding"><h3>What this run says</h3><p>${state.data.interpretation.finding}</p></div>
        <div class="finding"><h3>What it does not say</h3><p>It does not collapse unlike workloads into a winner. The 35B MoE builds are roughly four times faster in generation; the 27B builds complete more sandbox trials. Tool, concurrency, and vision results are tied.</p></div>
      </section>`;
    }

    function bars(metric, label, unit, inverse = false) {
      const values = state.data.models.map(m => m.performance[metric].median);
      const max = Math.max(...values);
      return `<div class="chart-block"><div class="chart-head"><h3>${label}</h3><span>median · ${unit}</span></div><div class="bar-list">${state.data.models.map((m,i) => {
        const v = m.performance[metric].median;
        return `<div class="bar-row ${m.id === state.selected ? 'selected' : ''}"><span class="bar-label">${modelShort(m)}</span><div class="bar-track"><div class="bar-fill" style="transform:scaleX(${v / max})"></div></div><span class="bar-value">${format(v, inverse ? 3 : 1)}</span></div>`;
      }).join('')}</div></div>`;
    }

    function contextChart() {
      const width=900,height=270,left=56,right=22,top=20,bottom=36, max=2800;
      const contexts=['8k','32k','64k','120k'];
      const x=i=>left+i*((width-left-right)/(contexts.length-1));
      const y=v=>top+(max-v)/max*(height-top-bottom);
      const grid=[0,700,1400,2100,2800];
      return `<div class="chart-block wide"><div class="chart-head"><h3>Context recall prompt processing</h3><span>median prompt tok/s · exact prompt count retained in data</span></div>
        <svg class="context-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Prompt processing speed across context lengths">${grid.map(v=>`<line class="gridline" x1="${left}" y1="${y(v)}" x2="${width-right}" y2="${y(v)}"/><text class="axis-text" x="4" y="${y(v)+4}">${v}</text>`).join('')}${contexts.map((v,i)=>`<text class="axis-text" text-anchor="middle" x="${x(i)}" y="${height-8}">${v}</text>`).join('')}${state.data.models.map((m,mi)=>{const points=m.performance.contextRecall.map((d,i)=>`${x(i)},${y(d.promptPerSecond.median)}`).join(' ');return `<polyline class="line" points="${points}" stroke="${colors[mi]}" opacity="${m.id===state.selected?1:.35}"/>${m.performance.contextRecall.map((d,i)=>`<circle class="point" cx="${x(i)}" cy="${y(d.promptPerSecond.median)}" r="${m.id===state.selected?5:3}" fill="${colors[mi]}"/>`).join('')}`}).join('')}</svg>
        <div class="legend">${state.data.models.map((m,i)=>`<button data-model-select="${m.id}"><i style="background:${colors[i]}"></i>${modelShort(m)}</button>`).join('')}</div></div>`;
    }

    function performance() {
      return `<section class="view ${state.view === 'performance' ? 'active' : ''}" id="view-performance"><div class="section-intro"><div><h2>Performance</h2><p>Repeated prompt processing, generation, agent-shaped streaming, cache reuse, and long-context recall.</p></div><p class="reading">Higher is better except TTFT. Figures are medians across five fair-profile repeats.</p></div><div class="chart-grid">${bars('directGeneration','Direct generation','tok/s')}${bars('agentTtft','Agent-shaped TTFT','seconds',true)}${bars('referenceAgent','Reference agent loop','tok/s')}${bars('coldPrompt','Cold short-prompt processing','tok/s')}${contextChart()}</div></section>`;
    }

    function taskMatrix(kind) {
      const tasks = Object.keys(state.data.models[0][kind].tasks);
      return `<div class="task-grid"><div class="task-cell head">Task</div>${state.data.models.map(m=>`<div class="task-cell head ${m.id===state.selected?'selected-col':''}">${m.build}<br><span style="opacity:.65">${m.family.split(' · ')[0]}</span></div>`).join('')}${tasks.map(task=>`<div class="task-cell label">${prettyTask(task)}</div>${state.data.models.map(m=>{const r=m[kind].tasks[task];return `<div class="task-cell ${m.id===state.selected?'selected-col':''}"><div class="task-result"><span class="blocks">${Array.from({length:r.total},(_,i)=>`<i class="${i<r.passed?'pass':'fail'}"></i>`).join('')}</span><b>${r.passed}/${r.total}</b></div></div>`}).join('')}`).join('')}</div>`;
    }

    function qualityView(kind, title, copy) {
      const selected = state.data.models.find(m=>m.id===state.selected);
      const annotations = kind === 'tools' && selected.notes.length ? `<div class="annotation"><b>Retained evidence note:</b> ${selected.notes.join(' ')}</div>` : '';
      return `<section class="view ${state.view === kind ? 'active' : ''}" id="view-${kind}"><div class="section-intro"><div><h2>${title}</h2><p>${copy}</p></div><p class="reading">Core and holdout remain separate. Each block is one retained trial.</p></div><div class="split-summary">${state.data.models.map(m=>`<div class="split-item"><b>${m[kind].passed}/${m[kind].total}</b><span>${modelShort(m)} · total</span></div>`).join('')}</div>${taskMatrix(kind)}${annotations}</section>`;
    }

    function smallSuite(kind, title, copy) {
      const tasks = kind === 'concurrency' ? Object.keys(state.data.models[0].concurrency.reliability) : [];
      return `<section class="view ${state.view === kind ? 'active' : ''}" id="view-${kind}"><div class="section-intro"><div><h2>${title}</h2><p>${copy}</p></div><p class="reading">Reported independently from single-request throughput.</p></div><div class="matrix-scroll"><table class="matrix"><thead><tr><th>Candidate</th><th>Applicable</th><th>Result</th>${tasks.map(t=>`<th>${prettyTask(t)}</th>`).join('')}</tr></thead><tbody>${state.data.models.map(m=>{const s=m[kind];return `<tr data-model="${m.id}" class="${m.id===state.selected?'selected':''}"><td class="model-cell"><b>${m.name}</b><small>${m.build}</small></td><td>${s.applicable?'Yes':'No'}</td><td>${ratio(s)}</td>${tasks.map(t=>`<td>${ratio(s.reliability[t])}</td>`).join('')}</tr>`}).join('')}</tbody></table></div></section>`;
    }

    function method() {
      const d=state.data.models[0];
      return `<section class="view ${state.view === 'method' ? 'active' : ''}" id="view-method"><div class="section-intro"><div><h2>Method & provenance</h2><p>Enough context to interpret the results without reproducing raw benchmark artifacts.</p></div></div><div class="method-grid"><div><h3>Fair profile</h3><p>All candidates used ${d.profile.id}: fixed 128k context, q8 KV, five performance repeats, three quality repeats, and holdout tasks enabled.</p></div><div><h3>Qualification</h3><p>${state.data.interpretation.releaseMeaning} All required suites must pass every strict release requirement.</p></div><div><h3>Separate production evidence</h3><p>OpenWendy is an external production-profile harness. Its outcomes are intentionally not compared with these fair model/runtime measurements.</p></div></div><div class="finding"><h3>Data policy</h3><p>${state.data.interpretation.separation}</p></div></section>`;
    }

    function render() {
      const d=state.data;
      document.getElementById('app').innerHTML = `<section class="run-head"><div><div class="overline">Barrage V2 / release evidence</div><h1>Four builds. Six separate questions.</h1><p>${d.interpretation.separation}</p></div><div class="gate-note"><span class="gate-mark" aria-hidden="true">×</span><div><b>0 of 4 release-qualified</b><p>${d.interpretation.releaseMeaning}</p></div></div></section>${modelSelector()}${suiteNav()}${overview()}${performance()}${qualityView('tools','Tool contract','Executable restraint, exact arguments, dependent sequences, recovery, duplicate avoidance, and evidence use.')}${qualityView('sandbox','Sandbox coding','Disposable coding tasks graded on acceptance, exact file scope, test execution, and recovery behavior.')}${smallSuite('concurrency','Concurrency','Two simultaneous generations and mixed prefill/generation contention.')}${smallSuite('vision','Vision','Deterministic image ingestion and multimodal decoding task.')}${method()}<footer class="provenance"><b>Normalized from ${d.source.schemaVersion} · ${d.source.label}</b><span>source digest ${d.source.digest}</span></footer>`;
      bind();
    }

    function bind() {
      document.querySelectorAll('[data-model-select], tr[data-model]').forEach(el=>el.addEventListener('click',()=>{state.selected=el.dataset.modelSelect||el.dataset.model;render()}));
      document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>{state.view=el.dataset.view;render();document.querySelector('.suite-nav').scrollIntoView({block:'start'})}));
    }

    fetch('data/barrage-v2.json').then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}).then(data=>{state.data=data;render()}).catch(error=>{
      document.getElementById('app').innerHTML=`<div class="error"><b>Benchmark data could not be loaded.</b><p>${error.message}. Serve this directory over HTTP so the normalized JSON is available.</p></div>`;
    });
  </script>
</body>
</html>
